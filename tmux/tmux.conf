# advertise tmux-256color instead of screen-256color
set -g default-terminal "tmux-256color"

# for tmux >= 3.2, enable full RGB passthrough
set -as terminal-features 'tmux-256color:RGB'
set -as terminal-features 'xterm-256color:RGB'

set -g mouse on

# Setup quick config reload
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Change prefix to Ctrl-a
unbind C-b
set -g prefix C-s
bind-key C-s send-prefix
bind -n C-s send-keys C-s

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Spline panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Configure catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'default'

# Window styling
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_window_number_position 'left'
set -g @catppuccin_window_flags 'icon'

set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
set-option -g status-position top

run '~/.config/tmux/plugins/tpm/tpm'

# Status bar layout (must come after TPM loads catppuccin)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{@catppuccin_status_gitmux}"
