set-option -sa terminal-overrides ",xterm*:Tc"

# macOS: tmux doesn't inherit the login shell PATH, so Homebrew tools are missing
if-shell "uname | grep -q Darwin" \
  "set-environment -g PATH '/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin'"

set -g mouse on

# Setup quick config reload
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Change prefix to Ctrl-a
unbind C-b
set -g prefix C-space
bind-key C-space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Spline panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Configure catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'default'

# Window styling
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_window_number_position 'left'
set -g @catppuccin_window_flags 'icon'

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v  send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y  send -X copy-selection-and-cancel

bind r source-file ~/.config/tmux/tmux.conf
set-option -g status-position top

run '~/.config/tmux/plugins/tpm/tpm'

# Sesh session manager (using tv as picker)
bind-key "T" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' "sesh connect \$(tv sesh)"

# Status bar layout (must come after TPM loads catppuccin)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{@catppuccin_status_gitmux}"
